<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeSummit — เข้าสู่ระบบ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@700;800&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sarabun',sans-serif;background:#FAF6EA;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 16px;}

.card{background:#fff;border-radius:20px;box-shadow:0 12px 48px rgba(40,28,18,.13);padding:36px 32px;width:100%;max-width:420px;}

/* Logo */
.logo-wrap{text-align:center;margin-bottom:6px;}
.logo-star{color:#C9A24B;font-size:14px;display:block;margin-bottom:6px;}
.logo{display:inline-flex;align-items:center;gap:8px;font-family:'Kanit',sans-serif;font-weight:800;font-size:22px;color:#2B2118;}
.logo svg{width:28px;height:28px;}
.logo-sub{text-align:center;font-size:12.5px;color:#8B7355;margin-bottom:22px;}

/* Tabs */
.tabs{display:grid;grid-template-columns:1fr 1fr;background:#F5EFE0;border-radius:12px;padding:4px;margin-bottom:28px;gap:0;}
.tab{padding:10px;border-radius:9px;border:none;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:.15s;color:#8B7355;background:transparent;}
.tab.active{background:#fff;color:#2B2118;box-shadow:0 2px 8px rgba(40,28,18,.1);}

/* Form section */
.form-title{font-family:'Kanit',sans-serif;font-size:18px;font-weight:700;color:#2B2118;text-align:center;margin-bottom:4px;}
.form-sub{font-size:12.5px;color:#8B7355;text-align:center;margin-bottom:22px;}

.field{margin-bottom:15px;}
.field label{display:block;font-size:12.5px;font-weight:600;color:#2B2118;margin-bottom:6px;}
.field input{width:100%;padding:13px 15px;border:1.5px solid #E0D5BD;border-radius:10px;font-family:'Sarabun',sans-serif;font-size:15px;color:#2B2118;outline:none;background:#FCFAF3;transition:.15s;}
.field input:focus{border-color:#C9A24B;box-shadow:0 0 0 3px rgba(201,162,75,.14);}
.field input::placeholder{color:#C0B090;}

.row-opts{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.remember{display:flex;align-items:center;gap:7px;font-size:13px;color:#5C4E3A;cursor:pointer;}
.remember input[type=checkbox]{width:15px;height:15px;accent-color:#C9A24B;cursor:pointer;}
.forgot{font-size:13px;color:#E2672B;font-weight:600;text-decoration:none;}
.forgot:hover{text-decoration:underline;}

.btn-login{width:100%;background:#E2672B;color:#fff;border:none;border-radius:10px;padding:14px;font-family:'Sarabun',sans-serif;font-weight:700;font-size:16px;cursor:pointer;transition:.15s;box-shadow:0 8px 20px rgba(226,103,43,.28);}
.btn-login:hover{filter:brightness(1.06);}

.divider{display:flex;align-items:center;gap:10px;margin:20px 0;color:#C0B090;font-size:12px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#EDE4D0;}

.social-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.btn-social{display:flex;align-items:center;justify-content:center;gap:8px;padding:11px;border:1.5px solid #E0D5BD;border-radius:10px;background:#fff;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:600;color:#2B2118;cursor:pointer;transition:.15s;}
.btn-social:hover{border-color:#C9A24B;background:#FDFAF3;}

.register-row{text-align:center;font-size:13px;color:#8B7355;}
.register-row a{color:#E2672B;font-weight:600;text-decoration:none;}
.register-row a:hover{text-decoration:underline;}

.back{display:flex;align-items:center;justify-content:center;gap:5px;margin-top:18px;font-size:13px;color:#8B7355;text-decoration:none;}
.back:hover{color:#2B2118;}
.back svg{width:14px;height:14px;}

.err{display:none;background:#FEF0EE;color:#C0552F;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;text-align:center;}
</style>
</head>
<body>

<div class="card">
  <!-- Logo -->
  <div class="logo-wrap">
    <img src="brand/safesummit-full-dark.png" alt="SafeSummit" style="height:38px;width:auto;display:block;margin:0 auto;">
  </div>
  <p class="logo-sub">ตัวกลางเดินป่าที่เช็คแล้ว</p>

  <!-- Role badge (หน้าจอแยกตามบทบาท) -->
  <div style="text-align:center;margin:2px 0 14px;">
    <span id="roleChip" style="display:inline-flex;align-items:center;gap:7px;font-weight:700;font-size:13.5px;padding:8px 18px;border-radius:22px;background:#FBEDE3;color:#E2672B;">🥾 เข้าสู่ระบบลูกค้า / นักเดินป่า</span>
  </div>

  <!-- Error -->
  <div class="err" id="errMsg"></div>

  <!-- Title -->
  <div class="form-title" id="formTitle">เข้าสู่ระบบ</div>
  <div class="form-sub" id="formSub">เข้าสู่ระบบในฐานะลูกค้า / นักเดินป่า</div>

  <!-- Form -->
  <div class="field">
    <label>อีเมล</label>
    <input id="emailInput" type="email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')document.getElementById('pwInput').focus()">
  </div>
  <div class="field">
    <label>รหัสผ่าน</label>
    <input id="pwInput" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
  </div>

  <div class="row-opts">
    <label class="remember"><input type="checkbox" id="rememberMe"> จดจำฉันไว้</label>
    <a href="#" class="forgot" onclick="doForgot(event)">ลืมรหัสผ่าน?</a>
  </div>

  <button class="btn-login" onclick="doLogin()">เข้าสู่ระบบ</button>

  <div class="register-row" id="registerRow">
    ยังไม่มีบัญชี? <a id="registerLink" href="register.html">สมัครสมาชิก</a>
  </div>

  <div style="text-align:center;margin-top:14px;padding-top:14px;border-top:1px solid #EFE6D3;">
    <a id="switchRoleLink" href="login.html?role=organizer" style="font-size:13px;color:#8B7E6B;">เป็นผู้จัดทริป? <b style="color:#E2672B;">เข้าสู่ระบบผู้จัด →</b></a>
  </div>

  <a href="index.html" class="back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    กลับหน้าแรก
  </a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://wucrvtgpjqjxxqarzcpv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_ZSUjn3Y0_8FnVI2RlI08FA_-DY4NsVe';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let currentRole = 'customer';

// ?next= redirect target (same-site relative paths only)
function getNext(){
  const n = new URLSearchParams(location.search).get('next');
  if(!n) return null;
  const dec = decodeURIComponent(n);
  // block absolute URLs / protocol-relative to avoid open redirect
  if(/^(https?:)?\/\//i.test(dec) || dec.includes('://')) return null;
  return dec;
}

// หน้าจอ login แยกตามบทบาท — ล็อกบทบาทจาก ?role= (default = ลูกค้า)
(function(){
  const role = new URLSearchParams(location.search).get('role');
  currentRole = role === 'organizer' ? 'organizer' : 'customer';
  const isOrg = currentRole === 'organizer';
  document.getElementById('roleChip').textContent = isOrg ? '⛺ เข้าสู่ระบบผู้จัดทริป' : '🥾 เข้าสู่ระบบลูกค้า / นักเดินป่า';
  document.getElementById('formSub').textContent = isOrg ? 'เข้าสู่ระบบในฐานะผู้จัดทริป' : 'เข้าสู่ระบบในฐานะลูกค้า / นักเดินป่า';
  const rl = document.getElementById('registerLink');
  if(rl){
    rl.setAttribute('href', isOrg ? 'organizer.html?register=1' : 'register.html');
    rl.textContent = isOrg ? 'สมัครเป็นผู้จัด' : 'สมัครสมาชิก';
  }
  // ลิงก์สลับไปหน้าจ login อีกบทบาท (คงค่า next ไว้ด้วย)
  const nx = new URLSearchParams(location.search).get('next');
  const nxQ = nx ? ('&next=' + encodeURIComponent(nx)) : '';
  const sw = document.getElementById('switchRoleLink');
  if(sw){
    if(isOrg){ sw.href = 'login.html?role=customer' + (nx?('&next='+encodeURIComponent(nx)):''); sw.innerHTML = 'เป็นลูกค้า / นักเดินป่า? <b style="color:#E2672B;">เข้าสู่ระบบลูกค้า →</b>'; }
    else     { sw.href = 'login.html?role=organizer' + (nx?('&next='+encodeURIComponent(nx)):''); sw.innerHTML = 'เป็นผู้จัดทริป? <b style="color:#E2672B;">เข้าสู่ระบบผู้จัด →</b>'; }
  }
})();

async function doLogin(){
  const email = document.getElementById('emailInput').value.trim();
  const pw    = document.getElementById('pwInput').value;
  const err   = document.getElementById('errMsg');
  err.style.display = 'none';
  err.style.color = ''; err.style.background = '';   // reset จาก doForgot (สีเขียว)
  if(!email || !pw){ err.textContent = 'กรุณากรอกอีเมลและรหัสผ่าน'; err.style.display = 'block'; return; }
  const { data, error } = await db.auth.signInWithPassword({ email, password: pw });
  if(error){ err.textContent = 'อีเมลหรือรหัสผ่านไม่ถูกต้อง'; err.style.display = 'block'; return; }

  // ตรวจสถานะอนุมัติ (เฉพาะลูกค้า) — organizer มีระบบ gate ของตัวเองใน organizer.html
  if(currentRole === 'customer'){
    // แยกบทบาทชัดเจน: อีเมลที่เป็น "ผู้จัด" เข้าในฐานะลูกค้าไม่ได้ (จองทริปไม่ได้)
    try {
      const { data: o } = await db.from('organizers').select('id').eq('user_id', data.user.id).maybeSingle();
      if(o){
        await db.auth.signOut();
        err.textContent = 'อีเมลหรือรหัสผ่านไม่ถูกต้อง';
        err.style.display = 'block';
        return;
      }
    } catch(e){}
    let status = 'approved';
    try {
      const { data: prof } = await db.from('users').select('status,role').eq('id', data.user.id).maybeSingle();
      if(prof && prof.status) status = prof.status;
    } catch(e){}
    if(status === 'pending'){
      await db.auth.signOut();
      err.textContent = 'บัญชีของคุณกำลังรอ Admin อนุมัติ กรุณารอการยืนยัน';
      err.style.display = 'block';
      return;
    }
    if(status === 'suspended'){
      await db.auth.signOut();
      err.textContent = 'บัญชีของคุณถูกระงับ กรุณาติดต่อผู้ดูแลระบบ';
      err.style.display = 'block';
      return;
    }
  }

  // ผู้จัด: ต้องมีข้อมูลใน organizers
  if(currentRole === 'organizer'){
    let org = null;
    try {
      const { data: o } = await db.from('organizers').select('status').eq('user_id', data.user.id).maybeSingle();
      org = o;
    } catch(e){}
    if(!org){
      // รหัสผ่านถูกต้องแล้ว แต่ยังไม่มีใบสมัครผู้จัด (เช่น สมัครค้างไว้)
      // อย่า signOut — คงเซสชันไว้เพื่อให้กรอกใบสมัครต่อได้ (และ insert ผ่าน RLS)
      err.textContent = 'บัญชีนี้ยังไม่มีข้อมูลผู้จัดทริป — กำลังพาไปกรอกใบสมัคร...';
      err.style.color = '#7A5E1A'; err.style.background = '#FDF6E3';
      err.style.display = 'block';
      setTimeout(() => { location.href = 'organizer.html?register=1'; }, 1400);
      return;
    }
    if(org.status === 'suspended'){
      await db.auth.signOut();
      err.textContent = 'บัญชีของคุณถูกระงับ กรุณาติดต่อผู้ดูแลระบบ';
      err.style.display = 'block';
      return;
    }
    // pending / รอแก้ไข / approved → organizer.html จัดการหน้าจอต่อ
  }

  const next = getNext();
  location.href = next ? next : (currentRole === 'organizer' ? 'organizer.html' : 'index.html');
}

async function doForgot(e){
  if(e) e.preventDefault();
  const err = document.getElementById('errMsg');
  err.style.display = 'none';
  const email = (document.getElementById('emailInput').value||'').trim();
  if(!email || !email.includes('@')){
    err.textContent = 'กรุณากรอกอีเมลในช่องด้านบนก่อน แล้วกด "ลืมรหัสผ่าน?" อีกครั้ง';
    err.style.display = 'block';
    document.getElementById('emailInput').focus();
    return;
  }
  const link = document.querySelector('.forgot');
  const orig = link.textContent;
  link.textContent = 'กำลังส่ง...';
  try {
    const redirectTo = location.href.replace(/[^/]*$/, 'reset-password.html');
    const { error } = await db.auth.resetPasswordForEmail(email, { redirectTo });
    if(error) throw error;
    err.textContent = '';
    err.style.color = '#2A7A4B';
    err.style.background = '#E8F5EE';
    err.textContent = 'ส่งลิงก์รีเซ็ตรหัสผ่านไปที่ ' + email + ' แล้ว กรุณาเช็คอีเมล';
    err.style.display = 'block';
  } catch(ex){
    err.textContent = 'ส่งลิงก์ไม่สำเร็จ กรุณาลองใหม่';
    err.style.display = 'block';
  }
  link.textContent = orig;
}

</script>
</body>
</html>
