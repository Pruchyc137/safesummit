<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeSummit — Sunrise Ridge</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Kanit:wght@500;600;700;800&family=Sarabun:wght@400;500;600&family=Bai+Jamjuree:wght@500;600;700&display=swap');
:root{
  --deep:#241B12; --cream:#FAF6EA; --gold:#C9A24B; --trail:#E2672B; --light:#EDE7D6;
  --dark:#2B2118; --muted:#6B5D4A; --pine:#3E7D5A; --pine-soft:#6FA587;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sarabun',sans-serif;background:#EDE6D5;padding:40px 24px;color:var(--dark);}
.wrap{max-width:1080px;margin:0 auto;}
.cap{font-family:'Bai Jamjuree',monospace;font-size:13px;color:var(--muted);margin-bottom:12px;}
.hero{position:relative;width:100%;height:470px;border-radius:18px;overflow:hidden;box-shadow:0 18px 44px rgba(36,27,18,.22);}
.hero svg.bg{position:absolute;inset:0;width:100%;height:100%;}
.logo{font-family:'Kanit',sans-serif;font-weight:800;letter-spacing:.02em;display:flex;align-items:center;gap:9px;font-size:21px;color:var(--cream);}
.logo .mk{width:30px;height:30px;}
.navmini{display:flex;gap:24px;font-size:14px;color:#E9DBC5;}
.vpill{display:inline-flex;align-items:center;gap:7px;padding:7px 14px;border-radius:30px;font-family:'Bai Jamjuree',monospace;font-size:12px;font-weight:600;background:rgba(62,125,90,.28);border:1px solid #6FA587;color:#CDEBD8;}
.vpill svg{width:14px;height:14px;}
.h-title{font-family:'Kanit',sans-serif;font-weight:800;line-height:1.1;font-size:54px;color:var(--cream);}
.h-sub{font-size:15px;max-width:430px;line-height:1.6;color:#E4D6BF;}
.cta{display:inline-flex;align-items:center;gap:8px;font-family:'Bai Jamjuree',monospace;font-weight:600;font-size:14px;letter-spacing:.04em;padding:14px 26px;border-radius:30px;background:var(--trail);color:#fff;}
</style>
</head>
<body>
<div class="wrap">
  <div class="cap">01 · Sunrise Ridge — ลดแสงพระอาทิตย์แล้ว</div>
  <div class="hero">
    <svg class="bg" viewBox="0 0 1080 470" preserveAspectRatio="xMidYMid slice">
      <defs>
        <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#2A2118"/>
          <stop offset="0.45" stop-color="#4E3320"/>
          <stop offset="0.74" stop-color="#9A5328"/>
          <stop offset="1" stop-color="#B86A38"/>
        </linearGradient>
        <radialGradient id="sun" cx="50%" cy="50%" r="50%">
          <stop offset="0" stop-color="#F4DDB0" stop-opacity=".34"/>
          <stop offset="1" stop-color="#F4DDB0" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <rect width="1080" height="470" fill="url(#sky)"/>
      <!-- much softer, smaller sun -->
      <circle cx="770" cy="235" r="120" fill="url(#sun)"/>
      <circle cx="770" cy="235" r="30" fill="#EBD6A8" opacity=".55"/>
      <!-- ridges -->
      <path d="M0,330 L150,278 L320,320 L500,262 L680,315 L880,262 L1080,315 L1080,470 L0,470 Z" fill="#7E5436" opacity=".62"/>
      <path d="M0,378 L220,330 L460,382 L700,322 L1080,382 L1080,470 L0,470 Z" fill="#553923"/>
      <!-- pine treeline accent -->
      <g fill="#2F5A3E" opacity=".92">
        <path d="M120,432 l9,-23 9,23 z"/><path d="M150,434 l8,-21 8,21 z"/><path d="M178,432 l10,-25 10,25 z"/>
        <path d="M210,435 l8,-20 8,20 z"/><path d="M236,433 l9,-22 9,22 z"/>
      </g>
      <path d="M0,432 L300,398 L600,440 L900,396 L1080,430 L1080,470 L0,470 Z" fill="#241B12"/>
    </svg>
    <div style="position:absolute;inset:0;padding:32px 46px;display:flex;flex-direction:column;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div class="logo"><svg class="mk" viewBox="0 0 48 48" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M8,33 L21,14 L34,33" stroke="#C9A24B" stroke-width="3.4"/><path d="M15,25 L20,31 L31,17" stroke="#E2672B" stroke-width="3.4"/></svg>SafeSummit</div>
        <div class="navmini"><span>ทริป</span><span>ผู้จัด</span><span>วิธีใช้</span></div>
      </div>
      <div style="margin-top:auto;">
        <span class="vpill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>ผู้จัดผ่านการยืนยันตัวจริง</span>
        <div class="h-title" style="margin-top:16px;">ทุกยอดเขา<br>มีเส้นทางที่<span style="color:var(--gold);">ไว้ใจได้</span></div>
        <div class="h-sub" style="margin-top:14px;">รวมผู้จัดทริปเดินป่าที่ตรวจสอบจริง จองปลอดภัยผ่านระบบ</div>
        <div style="margin-top:24px;"><span class="cta">เริ่มออกเดินทาง →</span></div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
