<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeSummit — ตั้งรหัสผ่านใหม่</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@700;800&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg-light:#FAF6EA; --card-light:#FFFFFF;
  --accent-trail:#E2672B; --accent-gold:#C9A24B;
  --text-dark:#2B2118; --text-muted:#6B5D4A; --line-muted:#B59A6E;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sarabun',sans-serif;background:var(--bg-light);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 16px;color:var(--text-dark);}
a{color:var(--accent-trail);text-decoration:none;}
svg{display:block;}
.card{background:var(--card-light);border-radius:20px;box-shadow:0 12px 48px rgba(40,28,18,.13);padding:36px 32px;width:100%;max-width:420px;}
.logo{display:flex;align-items:center;gap:8px;justify-content:center;font-family:'Kanit',sans-serif;font-weight:800;font-size:22px;color:var(--text-dark);margin-bottom:4px;}
.logo svg{width:28px;height:28px;}
.sub{text-align:center;font-size:13px;color:var(--text-muted);margin-bottom:26px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12.5px;font-weight:600;margin-bottom:6px;}
.field input{width:100%;padding:13px 15px;border:1.5px solid #E0D5BD;border-radius:10px;font-family:'Sarabun',sans-serif;font-size:15px;background:#FCFAF3;color:var(--text-dark);outline:none;transition:.15s;}
.field input:focus{border-color:var(--accent-gold);box-shadow:0 0 0 3px rgba(201,162,75,.14);}
.btn{width:100%;background:var(--accent-trail);color:#fff;border:none;border-radius:10px;padding:14px;font-family:'Sarabun',sans-serif;font-weight:700;font-size:15.5px;cursor:pointer;box-shadow:0 8px 20px rgba(226,103,43,.26);}
.btn:disabled{opacity:.6;cursor:not-allowed;}
.msg{display:none;border-radius:10px;padding:12px 15px;font-size:13.5px;margin-bottom:16px;text-align:center;}
.msg.err{display:block;background:#FEF0EE;color:#C0552F;}
.msg.ok{display:block;background:#E8F5EE;color:#2A7A4B;}
.state{display:none;}
.state.show{display:block;}
.center{text-align:center;}
.center .badge{width:70px;height:70px;border-radius:50%;background:#E8F5EE;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;}
.center h2{font-family:'Kanit',sans-serif;font-size:20px;margin-bottom:8px;}
.center p{font-size:14px;color:var(--text-muted);margin-bottom:20px;}
.back{display:block;text-align:center;margin-top:18px;font-size:13px;color:var(--text-muted);}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg viewBox="0 0 50 50" fill="none"><polygon points="25,4 46,40 4,40" stroke="#C9A24B" stroke-width="2.5" fill="none"/><polygon points="25,14 38,38 12,38" fill="rgba(226,103,43,.25)" stroke="#E2672B" stroke-width="1.5"/></svg>
    SafeSummit
  </div>
  <p class="sub">ตั้งรหัสผ่านใหม่</p>

  <!-- Loading -->
  <div class="state show" id="loadingState">
    <p class="center" style="color:var(--text-muted);padding:20px 0;">กำลังตรวจสอบลิงก์...</p>
  </div>

  <!-- Form -->
  <div class="state" id="formState">
    <div class="msg" id="msg"></div>
    <div class="field">
      <label>รหัสผ่านใหม่</label>
      <input id="pw" type="password" placeholder="อย่างน้อย 6 ตัวอักษร" autocomplete="new-password">
    </div>
    <div class="field">
      <label>ยืนยันรหัสผ่านใหม่</label>
      <input id="pw2" type="password" placeholder="พิมพ์รหัสผ่านอีกครั้ง" autocomplete="new-password" onkeydown="if(event.key==='Enter')doReset()">
    </div>
    <button class="btn" id="resetBtn" onclick="doReset()">บันทึกรหัสผ่านใหม่</button>
    <a class="back" href="login.html">กลับหน้าเข้าสู่ระบบ</a>
  </div>

  <!-- Invalid link -->
  <div class="state" id="invalidState">
    <div class="msg err" style="display:block;">ลิงก์ไม่ถูกต้องหรือหมดอายุแล้ว กรุณาขอลิงก์รีเซ็ตใหม่</div>
    <a class="btn" href="login.html" style="display:block;text-align:center;text-decoration:none;">กลับหน้าเข้าสู่ระบบ</a>
  </div>

  <!-- Success -->
  <div class="state" id="successState">
    <div class="center">
      <div class="badge"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#2A7A4B" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
      <h2>เปลี่ยนรหัสผ่านสำเร็จ!</h2>
      <p>ตอนนี้คุณสามารถเข้าสู่ระบบด้วยรหัสผ่านใหม่ได้แล้ว</p>
      <a class="btn" href="login.html" style="display:block;text-align:center;text-decoration:none;">เข้าสู่ระบบ</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/db.js"></script>
<script>
let recoveryReady = false;

function show(id){
  ['loadingState','formState','invalidState','successState'].forEach(s=>document.getElementById(s).classList.remove('show'));
  document.getElementById(id).classList.add('show');
}
function msg(text, ok){
  const m = document.getElementById('msg');
  m.textContent = text;
  m.className = 'msg ' + (ok ? 'ok' : 'err');
}

// Supabase ส่ง event PASSWORD_RECOVERY เมื่อผู้ใช้เปิดลิงก์จากอีเมล
db.auth.onAuthStateChange((event, session) => {
  if(event === 'PASSWORD_RECOVERY' || (event === 'SIGNED_IN' && session)){
    recoveryReady = true;
    show('formState');
  }
});

// เผื่อ event มาก่อน / กรณีมี session อยู่แล้ว — เช็คหลังโหลด
(async function(){
  // ให้เวลา supabase ประมวลผล token ใน URL hash
  await new Promise(r=>setTimeout(r, 900));
  if(!recoveryReady){
    try {
      const { data } = await db.auth.getSession();
      if(data?.session){ recoveryReady = true; show('formState'); return; }
    } catch(e){}
    // ไม่มี recovery session → ลิงก์ไม่ถูกต้อง
    show('invalidState');
  }
})();

async function doReset(){
  const pw  = document.getElementById('pw').value;
  const pw2 = document.getElementById('pw2').value;
  if(pw.length < 6){ msg('รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร'); return; }
  if(pw !== pw2){ msg('รหัสผ่านทั้งสองช่องไม่ตรงกัน'); return; }
  const btn = document.getElementById('resetBtn');
  btn.disabled = true; btn.textContent = 'กำลังบันทึก...';
  try {
    const { error } = await db.auth.updateUser({ password: pw });
    if(error) throw error;
    await db.auth.signOut();
    show('successState');
  } catch(e){
    msg('บันทึกไม่สำเร็จ: ' + (e.message||'ลองใหม่อีกครั้ง'));
    btn.disabled = false; btn.textContent = 'บันทึกรหัสผ่านใหม่';
  }
}
</script>
</body>
</html>
