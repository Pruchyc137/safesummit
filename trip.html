<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeSummit — รายละเอียดทริป</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Kanit:wght@600;700;800&family=Sarabun:wght@400;500;600;700&family=Bai+Jamjuree:wght@400;500;600&display=swap');
:root{
  --bg-deep:#2A2118;--bg-deep-2:#3A2C1C;--bg-light:#FAF6EA;
  --card-light:#FFFFFF;--bg-card:#F3ECDA;
  --accent-trail:#E2672B;--accent-gold:#C9A24B;
  --text-light:#EDE7D6;--text-dark:#2B2118;
  --text-muted:#6B5D4A;--line-muted:#B59A6E;
  --shadow:0 4px 24px rgba(40,28,18,.11);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Sarabun',sans-serif;color:var(--text-dark);background:var(--bg-light);min-height:100vh;}
a{text-decoration:none;color:inherit;}
svg{display:block;}
h1,h2,h3,h4{font-family:'Kanit',sans-serif;}

/* TOPBAR */
.topbar{background:var(--bg-deep);border-bottom:1px solid rgba(201,162,75,.2);position:sticky;top:0;z-index:50;}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;max-width:1160px;margin:0 auto;}
.brand{display:flex;align-items:center;gap:9px;font-family:'Kanit',sans-serif;font-weight:800;font-size:20px;color:var(--text-light);}
.brand .mark{width:30px;height:30px;}
.brand .istar{position:relative;display:inline-block;}
.brand .istar .star{position:absolute;left:50%;top:-0.42em;transform:translateX(-50%);width:.46em;height:.46em;color:var(--accent-gold);}
.back-btn{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--line-muted);border:1px solid rgba(181,154,110,.3);border-radius:8px;padding:7px 13px;transition:.15s;}
.back-btn:hover{color:var(--text-light);}
.back-btn svg{width:13px;height:13px;}

/* HERO */
.hero{position:relative;height:420px;overflow:hidden;background:var(--bg-deep);}
.hero-img{width:100%;height:100%;object-fit:cover;display:block;}
.hero-svg{position:absolute;inset:0;width:100%;height:100%;}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(42,33,24,.85) 0%,rgba(42,33,24,.1) 55%);}
.hero-content{position:absolute;bottom:0;left:0;right:0;padding:32px 40px 36px;max-width:1160px;margin:0 auto;}
.hero-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.9);font-family:'Bai Jamjuree',monospace;font-size:10px;font-weight:600;color:var(--text-dark);padding:4px 10px;border-radius:20px;margin-bottom:12px;}
.hero-badge svg{width:10px;height:10px;color:var(--accent-trail);}
.hero-title{font-size:34px;font-weight:800;color:#fff;line-height:1.2;margin-bottom:10px;text-shadow:0 2px 8px rgba(0,0,0,.3);}
.hero-meta{display:flex;flex-wrap:wrap;gap:14px;}
.hero-meta-item{display:flex;align-items:center;gap:6px;font-size:13.5px;color:rgba(237,231,214,.85);}
.hero-meta-item svg{width:14px;height:14px;color:var(--accent-gold);}
.hero-rating{display:inline-flex;align-items:center;gap:5px;background:rgba(226,103,43,.9);color:#fff;font-family:'Bai Jamjuree',monospace;font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px;}
@media(max-width:600px){.hero{height:300px;}.hero-title{font-size:22px;}.hero-content{padding:20px;}}

/* LAYOUT */
.page-wrap{max-width:1160px;margin:0 auto;padding:32px 24px 80px;display:grid;grid-template-columns:1fr 360px;gap:28px;align-items:start;}
@media(max-width:860px){.page-wrap{grid-template-columns:1fr;}}

/* PANELS */
.panel{background:var(--card-light);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px;}
.panel-head{padding:16px 22px;border-bottom:1px solid #E6DCC6;display:flex;align-items:center;gap:10px;}
.panel-head svg{width:17px;height:17px;color:var(--accent-trail);}
.panel-head h3{font-size:15px;font-weight:700;}
.panel-body{padding:20px 22px;}

/* INFO GRID */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.info-item{display:flex;flex-direction:column;gap:3px;}
.info-label{font-family:'Bai Jamjuree',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);}
.info-val{font-size:14.5px;font-weight:600;color:var(--text-dark);}
.info-val.orange{color:var(--accent-trail);}

/* ITINERARY */
.day-block{display:block;padding:16px 0;border-bottom:1px solid #F0E8D5;}
.day-block:last-child{border-bottom:none;padding-bottom:0;}
.day-title{font-size:14.5px;font-weight:700;margin-bottom:12px;color:var(--text-dark);}
.day-desc{font-size:13.5px;color:var(--text-muted);line-height:1.7;}
.day-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.day-tag{font-size:11.5px;background:#F5EFE0;color:var(--text-muted);padding:3px 9px;border-radius:20px;border:1px solid #E6DCC6;}
.slot-row{display:flex;align-items:stretch;}
.slot-time{font-size:12px;color:var(--text-muted);width:48px;text-align:right;padding-right:10px;flex-shrink:0;font-family:'Bai Jamjuree',monospace;padding-top:6px;line-height:1.4;}
.slot-line{display:flex;flex-direction:column;align-items:center;width:16px;flex-shrink:0;}
.slot-dot{width:7px;height:7px;border-radius:50%;background:#D5C8AE;flex-shrink:0;margin-top:7px;}
.slot-vline{width:1px;background:#E6DCC6;flex:1;}
.slot-body{padding:4px 0 12px 10px;font-size:13px;color:var(--text-dark);line-height:1.5;flex:1;}

/* INCLUDES */
.inc-list{list-style:none;}
.inc-list li{display:flex;align-items:center;gap:9px;font-size:13.5px;color:var(--text-dark);padding:7px 0;border-bottom:1px solid #F5EFE0;}
.inc-list li:last-child{border-bottom:none;}
.inc-list li svg{width:14px;height:14px;flex-shrink:0;}
.inc-list li.yes svg{color:#5C8A5A;}
.inc-list li.no svg{color:#C0552F;}
.inc-list li.no{color:var(--text-muted);}

/* GUIDE */
.guide-card{display:flex;align-items:center;gap:14px;padding:14px 0;}
.guide-avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Kanit',sans-serif;font-size:20px;font-weight:700;color:#fff;flex-shrink:0;}
.guide-name{font-size:15px;font-weight:700;margin-bottom:2px;}
.guide-sub{font-size:12.5px;color:var(--text-muted);}
.guide-badge{display:inline-flex;align-items:center;gap:4px;font-family:'Bai Jamjuree',monospace;font-size:10px;background:rgba(92,138,90,.12);color:#5C8A5A;border:1px solid rgba(92,138,90,.3);padding:2px 8px;border-radius:20px;margin-top:4px;}
.guide-badge svg{width:10px;height:10px;}
.guide-contacts{display:flex;gap:8px;margin-top:10px;}
.contact-btn{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;padding:7px 12px;border-radius:8px;border:1px solid #E6DCC6;background:var(--card-light);cursor:pointer;transition:.15s;}
.contact-btn:hover{background:#F5EFE0;}
.contact-btn svg{width:13px;height:13px;}
.contact-btn.line{border-color:#00B900;color:#00B900;}
.contact-btn.phone{border-color:var(--accent-trail);color:var(--accent-trail);}

/* STICKY BOOKING CARD */
.book-card{background:var(--card-light);border-radius:16px;box-shadow:0 8px 32px rgba(40,28,18,.14);padding:24px;position:sticky;top:80px;}
.book-price{font-family:'Kanit',sans-serif;font-size:32px;font-weight:800;color:var(--accent-trail);line-height:1;}
.book-price span{font-size:14px;font-weight:400;color:var(--text-muted);margin-left:3px;}
.book-rating{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text-muted);margin:8px 0 18px;}
.book-rating .stars{color:#F5A623;font-size:14px;}
.book-divider{height:1px;background:#E6DCC6;margin:16px 0;}
.book-row{display:flex;justify-content:space-between;font-size:13.5px;padding:5px 0;}
.book-row .label{color:var(--text-muted);}
.book-row .val{font-weight:600;}
.book-row .val.orange{color:var(--accent-trail);}
.seats-bar{background:#F5EFE0;border-radius:8px;padding:10px 13px;display:flex;align-items:center;gap:8px;margin:14px 0;font-size:13px;}
.seats-bar svg{width:14px;height:14px;color:var(--accent-trail);flex-shrink:0;}
.seats-bar b{color:var(--accent-trail);}
.btn-book{display:block;width:100%;padding:16px;background:var(--accent-trail);color:#fff;border:none;border-radius:10px;font-family:'Sarabun',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:.15s;margin-top:16px;text-align:center;}
.btn-book:hover{filter:brightness(1.08);}
.btn-book:disabled{background:#D5C8AE;color:#9B8E7A;cursor:not-allowed;}
.btn-book-full{display:block;width:100%;padding:16px;background:#D5C8AE;color:#9B8E7A;border:none;border-radius:10px;font-family:'Sarabun',sans-serif;font-size:16px;font-weight:700;margin-top:16px;text-align:center;}
.book-note{font-size:12px;color:var(--text-muted);text-align:center;margin-top:10px;}
.book-share{display:flex;align-items:center;justify-content:center;gap:6px;font-size:12.5px;color:var(--text-muted);margin-top:12px;cursor:pointer;border:none;background:none;width:100%;padding:8px;}
.book-share:hover{color:var(--accent-trail);}
.book-share svg{width:13px;height:13px;}

/* TAGS / PILLS */
.tag-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px;}
.tag{font-size:12.5px;background:#F5EFE0;border:1px solid #E6DCC6;color:var(--text-muted);padding:4px 11px;border-radius:20px;}

/* NOT FOUND */
.not-found{text-align:center;padding:80px 24px;}
.not-found h2{font-size:22px;margin-bottom:8px;color:var(--text-dark);}
.not-found p{color:var(--text-muted);margin-bottom:20px;}

/* SKELETON */
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.skeleton{background:linear-gradient(90deg,#F0E8D5 25%,#F8F2E4 50%,#F0E8D5 75%);background-size:800px;animation:shimmer 1.4s infinite;}
.sk-hero{height:420px;}
.sk-text{height:16px;border-radius:6px;margin-bottom:10px;}
</style>
</head>

function fmtDate(d){
  if(!d) return '–';
  return new Date(d+'T00:00:00').toLocaleDateString('th-TH',{day:'numeric',month:'long',year:'numeric'});
}

function fmtMoney(n){ return '฿'+(n||0).toLocaleString('th-TH'); }

function getDays(name){
  const m3=name.match(/(\d+)\s*วัน/);
  if(m3) return parseInt(m3[1]);
  if(name.includes('1 คืน')) return 2;
  if(name.includes('2 คืน')) return 3;
  if(name.includes('3 คืน')) return 4;
  return 1;
}

function avatarColor(name){
  const colors=['#E2672B','#3E6E8E','#5C8A5A','#C99A3B','#7A5C8A'];
  let h=0; for(const c of name) h=(h*31+c.charCodeAt(0))&0xffff;
  return colors[h%colors.length];
}

// แปลงกำหนดการที่ผู้จัดบันทึก (flat [{day,time,desc}]) → โครงสร้างวัน/ช่วงเวลา
// day 0 = วันเดินทางไป (1 วันก่อนวันเริ่ม), day 1 = วันเริ่มทริป (t.date), day 2 = t.date+1, ...
function itinDayTitle(d, startDate){
  const label = d===0 ? 'วันเดินทางไป' : 'วันที่ '+d;
  if(!startDate) return label;
  const dt = new Date(startDate+'T00:00:00');
  dt.setDate(dt.getDate() + (d-1));
  return `${label} · ${dt.toLocaleDateString('th-TH',{day:'numeric',month:'long',year:'numeric'})}`;
}
function itinFromSaved(t){
  if(!Array.isArray(t.itinerary) || !t.itinerary.length) return null;
  const byDay={};
  t.itinerary.forEach(r=>{ const d=(r.day!=null?r.day:1); (byDay[d]=byDay[d]||[]).push({time:r.time||'',desc:r.desc||''}); });
  return Object.keys(byDay).map(Number).sort((a,b)=>a-b).map(d=>({ title:itinDayTitle(d,t.date), slots:byDay[d] }));
}
function renderItinerary(t){
  const days=itinFromSaved(t) || genItinerary(t);
  document.getElementById('itinerary').innerHTML=days.map((d)=>`
    <div class="day-block">
      <div class="day-title">${d.title}</div>
      ${d.slots.map((s,si)=>`
        <div class="slot-row">
          <div class="slot-time">${s.time}</div>
          <div class="slot-line">
            <div class="slot-dot"></div>
            ${si<d.slots.length-1?'<div class="slot-vline"></div>':''}
          </div>
          <div class="slot-body">
            ${s.desc}
            ${s.tags?`<div class="day-tags">${s.tags.map(tag=>`<span class="day-tag">${tag}</span>`).join('')}</div>`:''}
          </div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function renderIncludes(t){
  const all=genIncludes(t);
  const yes=all.filter(i=>i.yes);
  const no=all.filter(i=>!i.yes);
  const mkList=(items,stroke,icon)=>items.map(item=>`
    <li style="display:flex;align-items:center;gap:9px;font-size:13.5px;padding:7px 0;border-bottom:1px solid #F0E8D5;">
      <svg viewBox="0 0 24 24" fill="none" stroke="${stroke}" stroke-width="2.5" width="16" height="16" style="flex-shrink:0;">${icon}</svg>
      <span>${item.text}</span>
    </li>`).join('');
  const head=(label,color)=>`<div style="font-size:11.5px;font-weight:700;color:${color};letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px;">${label}</div>`;
  document.getElementById('incList').innerHTML=`
    ${head('รวมในราคา','#0f6e56')}
    <ul style="list-style:none;padding:0;margin:0 0 16px;">
      ${mkList(yes,'#1D9E75','<path d="M20 6L9 17l-5-5"/>')}
    </ul>
    ${head('ไม่รวม','#a32d2d')}
    <ul style="list-style:none;padding:0;margin:0;">
      ${mkList(no,'#E24B4A','<path d="M18 6L6 18M6 6l12 12"/>')}
    </ul>`;
}

function renderGuide(t){
  const initial=(t.org||'?').charAt(0);
  const color=avatarColor(t.org||'');
  document.getElementById('guideCard').innerHTML=`
    <div class="guide-card">
      <div class="guide-avatar" style="background:${color};">${initial}</div>
      <div>
        <div class="guide-name">${t.org}</div>
        <div class="guide-sub">ผู้จัดทริปมืออาชีพ · ${t.prov}</div>
        <div class="guide-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>${t.badge}</div>
      </div>
    </div>
    <p style="font-size:13px;color:var(--text-muted);margin-top:8px;line-height:1.6;">การติดต่อและการดีลทั้งหมดจัดการผ่านแพลตฟอร์ม SafeSummit เพื่อความปลอดภัยของทั้งสองฝ่าย</p>
  `;
}

function renderBookCard(t){
  const isFull=t.status==='full'||t.booked>=t.cap;
  const avail=t.cap-t.booked;
  const days=getDays(t.name.th);
  document.getElementById('bookCard').innerHTML=`
    <div class="book-price">${fmtMoney(t.price)}<span>/ท่าน</span></div>
    <div class="book-rating"><span class="stars">★★★★★</span>${t.rating} · ${t.booked} คนเข้าร่วมแล้ว</div>
    <div class="book-divider"></div>
    <div class="book-row"><span class="label">วันที่</span><span class="val">${fmtDate(t.date)}</span></div>
    <div class="book-row"><span class="label">ระยะเวลา</span><span class="val">${days} วัน ${days>1?days-1+' คืน':''}</span></div>
    <div class="book-row"><span class="label">จังหวัด</span><span class="val">${t.prov}</span></div>
    <div class="book-row"><span class="label">ผู้จัด</span><span class="val">${t.org}</span></div>
    ${!isFull?`<div class="seats-bar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>เหลือเพียง <b>${avail} ที่นั่ง</b> จาก ${t.cap} ที่</div>`:''}
    <div class="book-divider"></div>
    ${isFull
      ?'<div class="btn-book-full">ทริปนี้เต็มแล้ว</div>'
      :`<a href="booking.html?id=${t.id}" class="btn-book">จองทริปนี้</a>`
    }
    <div class="book-note">จ่ายเมื่อได้รับการยืนยัน · ยกเลิกฟรีภายใน 48 ชม.</div>
    <button class="book-share" onclick="shareTrip()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      แชร์ทริปนี้
    </button>
  `;
}

function shareTrip(){
  if(navigator.share){
    navigator.share({title:trip?.name?.th,url:window.location.href});
  } else {
    navigator.clipboard.writeText(window.location.href).then(()=>toast('คัดลอกลิงค์แล้ว'));
  }
}

function toast(msg){
  let t=document.getElementById('toast');
  if(!t){ t=document.createElement('div'); t.id='toast'; t.style.cssText='position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#2A2118;color:#EDE7D6;padding:10px 20px;border-radius:8px;font-size:13.5px;font-weight:600;z-index:999;opacity:0;transition:.3s;pointer-events:none;'; document.body.appendChild(t); }
  t.textContent=msg; t.style.opacity='1';
  clearTimeout(t._t); t._t=setTimeout(()=>{t.style.opacity='0';},2200);
}

function seedIdxFromUUID(uuid){
  const last=uuid.split('-').pop();
  return parseInt(last,16)||0;
}
function mapSupabaseTrip(r){
  // seed ใช้ได้เฉพาะทริปที่ migrate มาจาก seed (id ขึ้นต้น 00000) เท่านั้น
  const isSeedFormat=/^00000/.test(r.id);
  const idx=isSeedFormat?seedIdxFromUUID(r.id):0;
  const seed=isSeedFormat?(SEED_TRIPS.find(s=>s.id===`t${idx}`)||{}):{};
  // ข้อมูลจาก DB ต้องชนะ seed เสมอ (seed = fallback เท่านั้น)
  const bt=r.organizers?.badge_tier||r.badge_tier||'';
  const badgeLabel=/pro/i.test(bt)?'Verified Pro':/basic/i.test(bt)?'Verified Basic':(seed.badge||'Verified Basic');
  return {
    id:r.id,
    name:r.name_th?{th:r.name_th,en:r.name_en||r.name_th}:(seed.name||{th:'',en:''}),
    org:r.organizers?.org_name||seed.org||'',
    region:r.region||seed.region||'',
    prov:r.province||seed.prov||'',
    date:r.start_date||seed.date||'',
    cap:r.capacity||seed.cap||0,
    booked:r.booked_count||seed.booked||0,
    price:parseFloat(r.price_per_person)||seed.price||0,
    status:r.status||seed.status||'open',
    badge:badgeLabel,
    rating:r.rating_avg||seed.rating||null,
    img:r.image_url||seed.img||null,
    scene:seed.scene||'peak',
    orgPhone:seed.orgPhone||'',
    orgLine:seed.orgLine||'',
    itinerary: Array.isArray(r.itinerary) ? r.itinerary : null,
    duration_days: r.duration_days || null,
    name_th: r.name_th || '',
  };
}

async function init(){
  const id=getTripId();
  if(!id){ document.getElementById('notFound').style.display='block'; return; }

  const isUUID=/^[0-9a-f-]{36}$/.test(id);
  if(isUUID && typeof db!=='undefined'){
    try{
      const {data,error}=await db.from('trips')
        .select('id,name_th,name_en,price_per_person,capacity,booked_count,start_date,region,province,status,image_url,itinerary,duration_days,rating_avg,badge_tier, organizers(org_name,badge_tier)')
        .eq('id',id).single();
      if(!error && data) trip=mapSupabaseTrip(data);
    }catch(e){ console.warn('Supabase fetch failed',e); }
  }

  if(!trip){
    loadTrips();
    trip=TRIPS.find(x=>x.id===id)||SEED_TRIPS.find(x=>x.id===id);
  }

  if(!trip){ document.getElementById('notFound').style.display='block'; return; }
  document.title='SafeSummit — '+trip.name.th;
  renderHero(trip);
  renderInfo(trip);
  renderItinerary(trip);
  renderIncludes(trip);
  renderGuide(trip);
  renderBookCard(trip);
  document.getElementById('pageWrap').style.display='grid';
}
init();
</script>
