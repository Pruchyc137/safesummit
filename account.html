<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeSummit — โปรไฟล์ของฉัน</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Kanit:wght@600;700;800&family=Sarabun:wght@400;500;600;700&family=Bai+Jamjuree:wght@400;500;600&display=swap');
:root{
  --bg-deep:#2A2118; --bg-light:#FAF6EA;
  --card-light:#FFFFFF; --bg-card:#F3ECDA;
  --accent-trail:#E2672B; --accent-gold:#C9A24B;
  --text-light:#EDE7D6; --text-dark:#2B2118;
  --text-muted:#6B5D4A; --line-muted:#B59A6E;
  --shadow:0 4px 20px rgba(40,28,18,.10);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sarabun',sans-serif;color:var(--text-dark);background:var(--bg-light);min-height:100vh;}
a{text-decoration:none;color:inherit;}
svg{display:block;}
h1,h2,h3{font-family:'Kanit',sans-serif;}

/* TOPBAR */
.topbar{background:var(--bg-deep);border-bottom:1px solid rgba(201,162,75,.2);position:sticky;top:0;z-index:60;}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;max-width:760px;margin:0 auto;}
.brand{display:flex;align-items:center;gap:9px;font-family:'Kanit',sans-serif;font-weight:800;font-size:20px;color:var(--text-light);}
.brand .mark{width:28px;height:28px;}
.brand .istar{position:relative;display:inline-block;}
.back-btn{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--line-muted);border:1px solid rgba(181,154,110,.3);border-radius:8px;padding:7px 13px;transition:.15s;}
.back-btn:hover{color:var(--text-light);}
.back-btn svg{width:13px;height:13px;}

.wrap{max-width:560px;margin:0 auto;padding:32px 24px 60px;}

/* Profile header card */
.profile-head{display:flex;align-items:center;gap:18px;background:var(--card-light);border-radius:18px;padding:24px;box-shadow:var(--shadow);margin-bottom:20px;}
.profile-avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--accent-trail),var(--accent-gold));color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Kanit',sans-serif;font-weight:700;font-size:32px;flex-shrink:0;}
.profile-info h1{font-size:21px;font-weight:700;color:var(--text-dark);margin-bottom:4px;}
.profile-info .email{font-size:13.5px;color:var(--text-muted);}
.role-badge{display:inline-flex;align-items:center;gap:5px;margin-top:8px;background:#FDF6E3;color:#A07A1E;border:1px solid rgba(201,162,75,.4);border-radius:20px;padding:3px 11px;font-size:11.5px;font-weight:600;}

/* Form card */
.card{background:var(--card-light);border-radius:18px;padding:26px 24px;box-shadow:var(--shadow);margin-bottom:18px;}
.card h2{font-size:16px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.card h2 svg{width:18px;height:18px;color:var(--accent-trail);}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--text-dark);margin-bottom:6px;}
.field input{width:100%;padding:12px 14px;border:1.5px solid #E0D5BD;border-radius:10px;font-family:'Sarabun',sans-serif;font-size:15px;color:var(--text-dark);background:#FCFAF3;outline:none;transition:.15s;}
.field input:focus{border-color:var(--accent-gold);box-shadow:0 0 0 3px rgba(201,162,75,.14);}
.field input:disabled{background:#F0EADC;color:var(--text-muted);cursor:not-allowed;}
.field .hint{font-size:11.5px;color:var(--line-muted);margin-top:5px;}

.btn{width:100%;border:none;border-radius:10px;padding:13px;font-family:'Sarabun',sans-serif;font-weight:700;font-size:15px;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:7px;}
.btn-save{background:var(--accent-trail);color:#fff;box-shadow:0 8px 20px rgba(226,103,43,.26);}
.btn-save:hover{filter:brightness(1.05);}
.btn-save:disabled{opacity:.6;cursor:not-allowed;}
.btn-logout{background:rgba(226,103,43,.08);color:var(--accent-trail);border:1px solid rgba(226,103,43,.35);}
.btn-logout:hover{background:rgba(226,103,43,.16);}
.btn-logout svg{width:16px;height:16px;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text-dark);color:#fff;padding:13px 22px;border-radius:30px;font-size:14px;font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,.25);opacity:0;transition:.25s;z-index:200;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.err{background:#C0552F;}

.loading{text-align:center;padding:80px 0;color:var(--text-muted);font-size:15px;}
.quick-links{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;}
.qlink{background:var(--card-light);border-radius:14px;padding:18px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:8px;transition:.15s;border:1.5px solid transparent;}
.qlink:hover{border-color:var(--accent-gold);transform:translateY(-2px);}
.qlink svg{width:24px;height:24px;color:var(--accent-trail);}
.qlink .qt{font-weight:700;font-size:14.5px;}
.qlink .qs{font-size:12px;color:var(--text-muted);}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="index.html">
      <img src="brand/safesummit-full-cream.png" alt="SafeSummit" style="height:28px;width:auto;">
    </a>
    <a class="back-btn" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      กลับหน้าแรก
    </a>
  </div>
</div>

<div class="wrap">
  <div id="loadingState" class="loading">กำลังโหลดข้อมูล...</div>

  <div id="content" style="display:none;">
    <!-- Profile header -->
    <div class="profile-head">
      <div class="profile-avatar" id="avatar">?</div>
      <div class="profile-info">
        <h1 id="displayName">—</h1>
        <div class="email" id="displayEmail">—</div>
        <span class="role-badge">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>
          ลูกค้า / นักเดินป่า
        </span>
      </div>
    </div>

    <!-- Quick links -->
    <div class="quick-links">
      <a class="qlink" href="my-trips.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3 12a9 9 0 1 0 18 0 9 9 0 0 0-18 0z"/><path d="M12 8v4l3 3"/></svg>
        <span class="qt">ทริปของฉัน</span>
        <span class="qs">ดูทริปที่จองไว้</span>
      </a>
      <a class="qlink" href="index.html#trips">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M21 21l-4.35-4.35"/><circle cx="11" cy="11" r="7"/></svg>
        <span class="qt">ค้นหาทริป</span>
        <span class="qs">หาทริปใหม่ไปเดินป่า</span>
      </a>
    </div>

    <!-- Edit form -->
    <div class="card">
      <h2>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v1"/></svg>
        ข้อมูลส่วนตัว
      </h2>
      <div class="field">
        <label>ชื่อ-นามสกุล</label>
        <input id="fName" type="text" placeholder="กรอกชื่อ-นามสกุล">
      </div>
      <div class="field">
        <label>ชื่อเล่น</label>
        <input id="fNickname" type="text" placeholder="ชื่อที่ใช้เรียกในทริป">
        <div class="hint">ใช้แสดงในแผนผังที่นั่ง/รายชื่อผู้ร่วมทริป — หากเว้นว่างจะใช้ชื่อจริงแทน</div>
      </div>
      <div class="field">
        <label>เบอร์โทรศัพท์</label>
        <input id="fPhone" type="tel" placeholder="08X-XXX-XXXX">
      </div>
      <div class="field">
        <label>อีเมล</label>
        <input id="fEmail" type="email" disabled>
        <div class="hint">อีเมลใช้สำหรับเข้าสู่ระบบ ไม่สามารถแก้ไขได้</div>
      </div>
      <button class="btn btn-save" id="saveBtn" onclick="saveProfile()">บันทึกข้อมูล</button>
    </div>

    <!-- Logout -->
    <div class="card">
      <button class="btn btn-logout" onclick="doLogout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        ออกจากระบบ
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/db.js"></script>
<script>
let CURRENT_USER = null;

async function init(){
  let user = null;
  try { const { data } = await db.auth.getUser(); user = data?.user || null; } catch(e){}
  if(!user){
    // not logged in → go to login
    location.replace('login.html');
    return;
  }
  CURRENT_USER = user;

  // load profile from users table
  let prof = {};
  try {
    const { data } = await db.from('users').select('full_name,nickname,phone,email').eq('id', user.id).maybeSingle();
    if(data) prof = data;
  } catch(e){}

  const name = prof.full_name || user.email || 'ลูกค้า';
  const email = prof.email || user.email || '';
  document.getElementById('displayName').textContent = name;
  document.getElementById('displayEmail').textContent = email;
  document.getElementById('avatar').textContent = (name||'?').trim().charAt(0).toUpperCase();
  document.getElementById('fName').value = prof.full_name || '';
  document.getElementById('fNickname').value = prof.nickname || '';
  document.getElementById('fPhone').value = prof.phone || '';
  document.getElementById('fEmail').value = email;

  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('content').style.display = 'block';
}

async function saveProfile(){
  const btn = document.getElementById('saveBtn');
  const fullName = document.getElementById('fName').value.trim();
  const nickname = document.getElementById('fNickname').value.trim();
  const phone = document.getElementById('fPhone').value.trim();
  if(!fullName){ toast('กรุณากรอกชื่อ-นามสกุล', true); return; }
  btn.disabled = true; btn.textContent = 'กำลังบันทึก...';
  try {
    const { error } = await db.from('users').update({ full_name: fullName, nickname: nickname||null, phone }).eq('id', CURRENT_USER.id);
    if(error) throw error;
    document.getElementById('displayName').textContent = fullName;
    document.getElementById('avatar').textContent = fullName.charAt(0).toUpperCase();
    toast('บันทึกข้อมูลเรียบร้อย');
  } catch(e){
    toast('บันทึกไม่สำเร็จ ลองอีกครั้ง', true);
  }
  btn.disabled = false; btn.textContent = 'บันทึกข้อมูล';
}

async function doLogout(){
  try { await db.auth.signOut(); } catch(e){}
  location.replace('index.html');
}

let toastTimer;
function toast(msg, isErr){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr ? ' err' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ t.className = 'toast' + (isErr ? ' err' : ''); }, 2600);
}

init();
</script>
</body>
</html>
